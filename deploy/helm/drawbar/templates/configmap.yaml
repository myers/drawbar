apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "drawbar.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
data:
  config.yaml: |
    server:
      url: {{ .Values.server.url | quote }}
      insecure: {{ .Values.server.insecure }}
    runner:
      name: {{ .Values.runner.name | quote }}
      labels:
{{ .Values.runner.labels | toYaml | indent 8 }}
      capacity: {{ .Values.runner.capacity }}
      fetch_interval: {{ .Values.runner.fetchInterval | quote }}
      fetch_timeout: {{ .Values.runner.fetchTimeout | quote }}
      timeout: {{ .Values.runner.timeout | quote }}
      {{- if .Values.runner.gitCloneUrl }}
      git_clone_url: {{ .Values.runner.gitCloneUrl | quote }}
      {{- end }}
      {{- if .Values.runner.actionsUrl }}
      actions_url: {{ .Values.runner.actionsUrl | quote }}
      {{- end }}
      {{- if .Values.runner.jobSecrets }}
      job_secrets:
{{ .Values.runner.jobSecrets | toYaml | indent 8 }}
      {{- end }}
    cache:
      enabled: {{ .Values.cache.enabled }}
      dir: {{ .Values.cache.dir | quote }}
      port: {{ .Values.cache.port }}
    {{- if .Values.snapshot.enabled }}
    snapshot:
      enabled: true
      class: {{ .Values.snapshot.class | quote }}
      storage_class: {{ .Values.snapshot.storageClass | quote }}
      size: {{ .Values.snapshot.size | quote }}
      retention_days: {{ .Values.snapshot.retentionDays }}
    {{- end }}
    log:
      level: {{ .Values.log.level | quote }}
